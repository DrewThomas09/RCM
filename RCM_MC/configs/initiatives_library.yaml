    ramp_months: 5
    confidence: A
    owner: HIM / Registration
    kpi: First-pass clean rate, rejection rate

  - id: eligibility_verification
    name: Eligibility and authorization verification
    description: Strengthen eligibility checks and pre-auth for Medicaid
    affected_parameters:
