# Initiatives Library — 8–12 standard RCM initiatives
# Each initiative: impacted params, expected lift, costs, ramp, confidence.
# Used by the Value Creation Engine (ranking, ROI, 100-day plan).
# Do not change the Monte Carlo kernel; this layer consumes outputs.

initiatives:
  - id: prior_auth_improvement
    name: Prior authorization process improvement
    description: Centralize auth verification, reduce pre-auth denials (auth team, payer portals)
    affected_parameters:
      - payer: Commercial
        param: idr
        delta_type: mult
        delta_mean: 0.85
        delta_sd: 0.05
      - payer: Medicare
        param: idr
        delta_type: mult
        delta_mean: 0.90
        delta_sd: 0.05
    one_time_cost: 75000
    annual_run_rate: 25000
    ramp_months: 6
    confidence: B
    owner: Auth team
    kpi: Auth denial rate

  - id: coding_cdi_improvement
    name: Coding / CDI improvement
    description: Strengthen clinical documentation and coding accuracy (CDI team, education)
    affected_parameters:
      - payer: Medicare
        param: fwr
        delta_type: mult
        delta_mean: 0.88
        delta_sd: 0.06
      - payer: Commercial
        param: fwr
        delta_type: mult
        delta_mean: 0.88
        delta_sd: 0.06
    one_time_cost: 120000
    annual_run_rate: 80000
    ramp_months: 9
    confidence: B
    owner: Coding / CDI
    kpi: FWR by denial type, DRG accuracy

  - id: denial_workflow_automation
    name: Denial workflow automation
    description: Automate L1 resolution, triage, and follow-up (RCM platform, rules engine)
    affected_parameters:
      - payer: Commercial
        param: appeal_stage_mix
        delta_type: delta
        delta_mean:
          L1: 0.05
          L2: -0.03
          L3: -0.02
      - payer: Medicaid
        param: appeal_stage_mix
        delta_type: delta
        delta_mean:
          L1: 0.04
          L2: -0.02
          L3: -0.02
    one_time_cost: 150000
    annual_run_rate: 60000
    ramp_months: 8
    confidence: B
    owner: Denials team
    kpi: L1 resolution rate, cycle time

  - id: contract_modeling_underpayments
    name: Contract modeling and underpayment focus
    description: Model expected reimbursement, prioritize underpayment recovery
    affected_parameters:
      - payer: Commercial
        param: upr
        delta_type: mult
        delta_mean: 0.80
        delta_sd: 0.08
      - payer: Commercial
        param: underpay_recovery
        delta_type: add
        delta_mean: 0.10
        delta_sd: 0.04
    one_time_cost: 90000
    annual_run_rate: 50000
    ramp_months: 6
    confidence: B
    owner: Contracting
    kpi: Underpayment rate, recovery rate

  - id: charge_capture_audits
    name: Charge capture audits
    description: Proactive charge capture review (coding, edits, missing charges)
    affected_parameters:
      - payer: Medicare
        param: upr
        delta_type: mult
        delta_mean: 0.85
        delta_sd: 0.07
      - payer: Commercial
        param: upr
        delta_type: mult
        delta_mean: 0.88
        delta_sd: 0.06
    one_time_cost: 60000
    annual_run_rate: 35000
    ramp_months: 4
    confidence: A
    owner: Coding / Revenue Integrity
    kpi: Charge lag, edit resolution rate

  - id: clean_claim_improvement
    name: Clean claim improvement
    description: Reduce front-end errors, improve first-pass clean rate
    affected_parameters:
      - payer: Commercial
        param: idr
        delta_type: mult
        delta_mean: 0.90
        delta_sd: 0.04
      - payer: Medicaid
        param: idr
        delta_type: mult
        delta_mean: 0.88
        delta_sd: 0.05
      - payer: Medicare
        param: dar_clean_days
        delta_type: mult
        delta_mean: 0.90
