    include_denials: true
    include_underpayments: true
    dar_clean_days: {dist: normal_trunc, mean: 22, sd: 3, min: 12, max: 45}
    denials:
      idr: {dist: beta, mean: 0.08, sd: 0.015, min: 0.03, max: 0.20}
      fwr: {dist: beta, mean: 0.35, sd: 0.06, min: 0.10, max: 0.65}
      stage_mix: {L1: 0.65, L2: 0.25, L3: 0.10}
      denial_types:
        eligibility: {share: 0.22, fwr_odds_mult: 0.85}
        auth_admin: {share: 0.18, fwr_odds_mult: 1.10}
        coding: {share: 0.28, fwr_odds_mult: 0.75}
        clinical: {share: 0.20, fwr_odds_mult: 1.40}
        other: {share: 0.12, fwr_odds_mult: 1.00}
    underpayments:
      upr: {dist: beta, mean: 0.06, sd: 0.015}
      severity: {dist: beta, mean: 0.04, sd: 0.01}
      recovery: {dist: beta, mean: 0.55, sd: 0.08}
