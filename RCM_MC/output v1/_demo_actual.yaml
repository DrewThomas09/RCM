# Semi-okay target hospital: $500M NPSR (mid-pack, not best-in-class)
# Payer mix and KPIs calibrated to published benchmarks (AHA, Kodiak, Fierce, Premier)
# Refs: see BENCHMARK_SOURCES.md

# Source tagging: this is a sample/illustrative actual — default to assumed.
# Fields calibrated from CSV data via --actual-data-dir are auto-marked observed.
_source_map:
  _default: assumed

hospital:
  name: Midwest Community Hospital ($500M NPSR)
  annual_revenue: 500000000

analysis:
  n_sims: 30000
  seed: 42
  working_days: 250

economics:
  wacc_annual: 0.12

operations:
  denial_capacity:
    enabled: true
    fte: 10
    denials_per_fte_per_day: 11
    backlog:
      enabled: true
      stage_shift_per_x: 0.22
      fwr_logit_penalty_per_x: 0.65
      days_multiplier_per_x: 0.18
      max_over_capacity_x: 3.0

underpayments:
  enabled: true

appeals:
  stages:
    L1:
      cost: {dist: lognormal, mean: 22, sd: 8}
      days: {dist: lognormal, mean: 16, sd: 6}
    L2:
      cost: {dist: lognormal, mean: 85, sd: 35}
      days: {dist: lognormal, mean: 40, sd: 12}
    L3:
      cost: {dist: lognormal, mean: 650, sd: 250}
      days: {dist: lognormal, mean: 140, sd: 40}

payers:
  # Payer mix: Medicare 42%, Medicaid 18%, Commercial 35%, SelfPay 5% (mid-market)
  # Medicare: MA 16% IDR (AHA 15.7%), FFS 8–9%; blended ~12%; FWR 3.1% NPSR target; DAR 60 (worse than 56.9 avg)
  Medicare:
    revenue_share: 0.42
    avg_claim_dollars: 2400
    include_denials: true
    include_underpayments: true
    dar_clean_days: {dist: normal_trunc, mean: 38, sd: 5, min: 22, max: 75}

    denials:
      idr: {dist: beta, mean: 0.12, sd: 0.025, min: 0.05, max: 0.22}
      fwr: {dist: beta, mean: 0.18, sd: 0.05, min: 0.04, max: 0.55}
      denial_mix_concentration: 110
      stage_mix: {L1: 0.72, L2: 0.23, L3: 0.05}
      denial_types:
        clinical: {share: 0.45, fwr_odds_mult: 1.40, stage_bias: {L3: 0.06}}
        coding:   {share: 0.35, fwr_odds_mult: 1.20, stage_bias: {L2: 0.03}}
        admin:    {share: 0.15, fwr_odds_mult: 1.05, stage_bias: {L2: 0.02}}
        other:    {share: 0.05, fwr_odds_mult: 1.10}

    underpayments:
      upr: {dist: beta, mean: 0.022, sd: 0.009, min: 0.0, max: 0.10}
      severity: {dist: beta, mean: 0.10, sd: 0.04, min: 0.01, max: 0.35}
      recovery: {dist: beta, mean: 0.70, sd: 0.10, min: 0.10, max: 0.95}
      followup_cost: {dist: lognormal, mean: 42, sd: 18}
      resolution_days: {dist: lognormal, mean: 42, sd: 14}

  # Medicaid: IDR 15–17% (Fierce); FWR higher; DAR ~50
  Medicaid:
    revenue_share: 0.18
    avg_claim_dollars: 2000
    include_denials: true
    include_underpayments: true
    dar_clean_days: {dist: normal_trunc, mean: 45, sd: 6, min: 25, max: 85}

    denials:
      idr: {dist: beta, mean: 0.16, sd: 0.03, min: 0.06, max: 0.38}
      fwr: {dist: beta, mean: 0.22, sd: 0.06, min: 0.05, max: 0.65}
      denial_mix_concentration: 85
      stage_mix: {L1: 0.72, L2: 0.22, L3: 0.06}
      denial_types:
        eligibility: {share: 0.36, fwr_odds_mult: 1.52, stage_bias: {L2: 0.04}}
        coding:      {share: 0.24, fwr_odds_mult: 1.18}
        clinical:    {share: 0.22, fwr_odds_mult: 1.28, stage_bias: {L3: 0.05}}
        admin:       {share: 0.13, fwr_odds_mult: 1.10}
        other:       {share: 0.05, fwr_odds_mult: 1.08}

    underpayments:
      upr: {dist: beta, mean: 0.028, sd: 0.011, min: 0.0, max: 0.12}
      severity: {dist: beta, mean: 0.12, sd: 0.05, min: 0.02, max: 0.45}
      recovery: {dist: beta, mean: 0.62, sd: 0.12, min: 0.05, max: 0.95}
      followup_cost: {dist: lognormal, mean: 48, sd: 20}
      resolution_days: {dist: lognormal, mean: 52, sd: 16}

  # Commercial: IDR 14% (AHA 13.9%); FWR higher; DAR ~32
  Commercial:
    revenue_share: 0.35
    avg_claim_dollars: 3000
    include_denials: true
    include_underpayments: true
    dar_clean_days: {dist: normal_trunc, mean: 32, sd: 5, min: 18, max: 75}

    denials:
      idr: {dist: beta, mean: 0.14, sd: 0.03, min: 0.05, max: 0.35}
      fwr: {dist: beta, mean: 0.14, sd: 0.04, min: 0.02, max: 0.50}
      denial_mix_concentration: 100
      stage_mix: {L1: 0.68, L2: 0.25, L3: 0.07}
      denial_types:
        auth_admin: {share: 0.42, fwr_odds_mult: 1.28, stage_bias: {L2: 0.05}}
        coding:     {share: 0.24, fwr_odds_mult: 1.12}
        clinical:   {share: 0.16, fwr_odds_mult: 1.22, stage_bias: {L3: 0.05}}
        eligibility: {share: 0.08, fwr_odds_mult: 1.32}
        other:      {share: 0.10, fwr_odds_mult: 1.08}

    underpayments:
      upr: {dist: beta, mean: 0.045, sd: 0.014, min: 0.0, max: 0.22}
      severity: {dist: beta, mean: 0.14, sd: 0.06, min: 0.02, max: 0.55}
      recovery: {dist: beta, mean: 0.66, sd: 0.11, min: 0.08, max: 0.98}
      followup_cost: {dist: lognormal, mean: 52, sd: 24}
      resolution_days: {dist: lognormal, mean: 52, sd: 18}

  SelfPay:
    revenue_share: 0.05
    avg_claim_dollars: 1500
    include_denials: false
    include_underpayments: false
    dar_clean_days: {dist: normal_trunc, mean: 65, sd: 12, min: 30, max: 140}

# ── Demo PE deal structure (added for run_all.sh) ──
deal:
  entry_ebitda: 50000000        # $50M TTM EBITDA at close
  entry_multiple: 9.0            # 9x EV/EBITDA purchase
  exit_multiple: 10.0            # 10x exit (1-turn expansion)
  hold_years: 5
  organic_growth_pct: 0.03       # 3% annual organic growth
  equity_pct: 0.40               # 40% equity / 60% debt
  covenant_max_leverage: 6.5     # senior credit covenant
  interest_rate: 0.08
  portfolio_deal_id: ccf_2026    # auto-register to portfolio
  portfolio_stage: hold
