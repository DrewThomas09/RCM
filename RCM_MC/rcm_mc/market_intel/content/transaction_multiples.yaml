# healthcare vertical aggregates, Irving Levin / Levin Associates).
# Refresh quarterly.

last_reviewed: 2026-04-23
source_urls:
  - https://mertztaggart.com/quarterly-reports
  - https://www.srsacquiom.com/resources
  - https://pitchbook.com
  - https://www.levinassociates.com

