# Medicare Advantage penetration by state — share of Medicare-eligible
# beneficiaries enrolled in MA (including SNPs), 2025 plan year.
#
# Curated approximations of KFF's state MA penetration tracker (built
# from CMS enrollment files). Values are rounded to the nearest point
# and refreshed annually after KFF publishes the new plan-year cut;
# verify against the current KFF/CMS release before quoting in an IC
# document. The analytical point survives ±2pp noise: which states are
# MA-saturated (rate pressure, utilization management, narrow networks)
# vs traditional-Medicare strongholds.

last_reviewed: 2026-06-12
source_urls:
  - https://www.kff.org/medicare/issue-brief/medicare-advantage-in-2025-enrollment-update-and-key-trends/
  - https://www.cms.gov/data-research/statistics-trends-reports/medicare-advantagepart-d-contract-and-enrollment-data

national_penetration_pct: 54

