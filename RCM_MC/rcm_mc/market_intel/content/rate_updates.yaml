# Medicare payment-rate update calendar by care setting.
#
# Curated from CMS final/proposed rules (IPPS, OPPS, PFS, ASC, SNF,
# Home Health, Hospice, IRF, ESRD). Values are the headline net payment
# update (market basket less productivity, plus statutory adjustments)
# — the number a deal team uses to project setting-level Medicare
# revenue. Verify against the final rule before any IC use: proposed
# values shift at finalization, and the PFS conversion factor in
# particular moves with legislation. Refresh on each rule cycle
# (proposed rules spring/summer, final rules summer/fall).

last_reviewed: 2026-06-12
source_urls:
  - https://www.cms.gov/medicare/payment/prospective-payment-systems
  - https://www.cms.gov/medicare/payment/fee-schedules/physician
  - https://www.federalregister.gov/agencies/centers-for-medicare-medicaid-services

# net_update_pct values are percent (2.6 = +2.6%). status is FINAL or
# PROPOSED. period uses the rule's own cycle (FY = Oct-Sep, CY = Jan-Dec).
settings:
  - setting: IPPS
    label: Inpatient hospital (IPPS)
    cycle: FY
    updates:
      - {period: "FY2024", net_update_pct: 3.1, status: FINAL}
      - {period: "FY2025", net_update_pct: 2.9, status: FINAL}
      - {period: "FY2026", net_update_pct: 2.6, status: FINAL}
    note: >-
      Net of productivity cut; DSH and site-neutral policy shifts hit
      individual hospitals harder than the headline update suggests.

  - setting: OPPS
    label: Hospital outpatient (OPPS)
    cycle: CY
    updates:
      - {period: "CY2024", net_update_pct: 3.1, status: FINAL}
      - {period: "CY2025", net_update_pct: 2.9, status: FINAL}
      - {period: "CY2026", net_update_pct: 2.6, status: FINAL}
    note: >-
      Site-neutral expansion for drug administration is the live policy
      risk on HOPD-heavy targets — model it separately from the update.

  - setting: PFS
    label: Physician fee schedule (PFS)
    cycle: CY
    updates:
      - {period: "CY2024", net_update_pct: -1.3, status: FINAL}
      - {period: "CY2025", net_update_pct: -2.8, status: FINAL}
      - {period: "CY2026", net_update_pct: 3.3, status: FINAL}
    note: >-
      The structurally squeezed setting: conversion-factor cuts in 2024-25,
      partial statutory relief in 2026. Physician-services theses need a
      flat-to-down Medicare rate base case; do not extrapolate the 2026
      relief forward.

  - setting: ASC
    label: Ambulatory surgery centers (ASC)
    cycle: CY
    updates:
      - {period: "CY2024", net_update_pct: 3.1, status: FINAL}
      - {period: "CY2025", net_update_pct: 2.9, status: FINAL}
      - {period: "CY2026", net_update_pct: 2.6, status: FINAL}
    note: >-
      ASC update aligned to hospital market basket through CY2025 policy;
      covered-procedure-list additions are the upside lever, not rate.

  - setting: SNF
    label: Skilled nursing (SNF)
    cycle: FY
    updates:
      - {period: "FY2024", net_update_pct: 4.0, status: FINAL}
      - {period: "FY2025", net_update_pct: 4.2, status: FINAL}
      - {period: "FY2026", net_update_pct: 3.2, status: FINAL}
    note: >-
      Richest recent updates of any setting, but staffing-mandate
      compliance cost offsets much of the rate tailwind.

  - setting: HH
    label: Home health (HHA)
    cycle: CY
    updates:
      - {period: "CY2024", net_update_pct: 0.8, status: FINAL}
      - {period: "CY2025", net_update_pct: 0.5, status: FINAL}
      - {period: "CY2026", net_update_pct: -0.4, status: FINAL}
    note: >-
      Permanent behavioral-adjustment clawbacks net the market basket to
      roughly flat — the rate-pressure poster child. MA penetration
      compounds the squeeze on traditional-Medicare books.

  - setting: HOSPICE
    label: Hospice
    cycle: FY
    updates:
      - {period: "FY2024", net_update_pct: 3.1, status: FINAL}
      - {period: "FY2025", net_update_pct: 2.9, status: FINAL}
      - {period: "FY2026", net_update_pct: 2.6, status: FINAL}
    note: >-
      Stable updates; cap-liability management matters more than the
      headline rate for high-ALOS books.

  - setting: IRF
    label: Inpatient rehab (IRF)
    cycle: FY
    updates:
      - {period: "FY2024", net_update_pct: 3.4, status: FINAL}
      - {period: "FY2025", net_update_pct: 3.0, status: FINAL}
      - {period: "FY2026", net_update_pct: 2.6, status: FINAL}

  - setting: ESRD
    label: Dialysis (ESRD PPS)
    cycle: CY
    updates:
      - {period: "CY2024", net_update_pct: 2.1, status: FINAL}
      - {period: "CY2025", net_update_pct: 2.7, status: FINAL}
      - {period: "CY2026", net_update_pct: 1.9, status: FINAL}
    note: >-
      Low single-digit updates against labor inflation; mix shift to
      home dialysis is the margin story, not rate.
