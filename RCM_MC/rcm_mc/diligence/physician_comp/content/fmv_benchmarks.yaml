# Physician compensation FMV benchmark library.
#
# Seeded from PUBLIC AGGREGATES ONLY until MGMA / Sullivan Cotter /
# AMGA data licensing is formalised. Every entry flags which source
# it came from and which are placeholders. A real pre-sale
# engagement must pay for the licensed data before quoting these
# numbers in a memo.

last_reviewed: 2026-04-23
source_urls:
  - https://www.mgma.com/data/compensation-data (licensed — placeholder here)
  - https://www.sullivancotter.com/surveys/physician-compensation (licensed)
  - https://www.amga.org/research/physician-compensation-and-productivity (licensed)
  - https://www.beckershospitalreview.com/compensation-issues.html (public aggregates)

# Top-level data-license warning — UI + memo templates cite this.
data_license_status: PUBLIC_AGGREGATES
warning: |
  These anchors are public-aggregate approximations. A licensed
  MGMA / Sullivan Cotter / AMGA pull MUST replace them before
  publishing a partner-signed FMV opinion. VMG's FMV-MD remains
  the compliance-letter workflow of record.

