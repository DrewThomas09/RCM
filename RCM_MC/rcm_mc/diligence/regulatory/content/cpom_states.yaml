# Corporate Practice of Medicine state lattice.
#
# Seeded from the PESP tracker + state bill texts as of 2026-04.
# Every entry MUST carry source_urls and last_reviewed. The
# regulatory content-freshness test fails any entry older than
# 60 days — this is the forcing function for curation cadence.
#
# Fields per state:
#   code              — 2-letter USPS
#   name              — state name
#   statute           — primary cite
#   effective_date    — ISO (null if not yet law)
#   compliance_deadline — ISO (null if none)
#   structure_bans    — list of legal structures that are banned
#                       outright (void ab initio). Choose from:
#                       FRIENDLY_PC_PASS_THROUGH, MSO_PC_MANAGEMENT_FEE,
#                       DIRECT_EMPLOYMENT, PROFESSIONAL_LLC
#   structure_restrictions — list of structures subject to conditions
#   voided_contracts  — specific contract kinds that may be void
#   remediation_cost_usd — rough legal + restructuring estimate
#   last_reviewed     — ISO
#   source_urls       — list of public URLs
#
# "structure_bans" is the hard criterion that flips the composite
# score to RED. "structure_restrictions" triggers YELLOW.

last_reviewed: 2026-04-23
source_urls:
  - https://pestakeholder.org/healthcare-legislation-tracker/

states:
  - code: OR
    name: Oregon
    statute: SB 951 (2025)
    effective_date: 2026-01-01
    compliance_deadline: 2027-01-01
    structure_bans: [FRIENDLY_PC_PASS_THROUGH]
    structure_restrictions: [MSO_PC_MANAGEMENT_FEE]
    voided_contracts:
      - Management agreements that grant non-physician entities
        clinical decision-making authority are void ab initio.
      - Restrictive covenants on physicians in friendly-PC
        structures are unenforceable.
