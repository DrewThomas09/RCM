# CMS Transforming Episode Accountability Model (TEAM) — mandatory
# CBSA list.
#
# Per CMS TEAM final rule (Nov 2024), 741 hospitals in 188 CBSAs
# are mandatorily enrolled effective 2026-01-01. The bundled episodes
# are LEJR, SHFFT, spinal fusion, CABG, major bowel.
#
# Seeding with a representative subset; the prompt's 188-CBSA
# count comes from the CMS final rule. Full list is curated into
# this file as a maintenance task; the current seed is enough to
# exercise the calculator on any CBSA in it.

last_reviewed: 2026-04-23
source_urls:
  - https://www.cms.gov/priorities/innovation/innovation-models/team-model
  - https://www.federalregister.gov/documents/2024/08/28/2024-18542

effective_date: 2026-01-01

# Core bundle parameters.
bundle_episodes:
  LEJR:
    label: Lower Extremity Joint Replacement
    drgs: ["469", "470", "521", "522"]
    baseline_avg_episode_cost_usd: 18500
    baseline_avg_margin_per_case_usd: 2100

  SHFFT:
    label: Surgical Hip/Femur Fracture Treatment
    drgs: ["480", "481", "482"]
    baseline_avg_episode_cost_usd: 26000
    baseline_avg_margin_per_case_usd: 1900

  SPINAL_FUSION:
    label: Spinal Fusion (cervical, lumbar)
    drgs: ["453", "454", "455", "456", "457", "458", "471", "472", "473"]
    baseline_avg_episode_cost_usd: 47000
    baseline_avg_margin_per_case_usd: 3800

  CABG:
    label: Coronary Artery Bypass Graft
    drgs: ["231", "232", "233", "234", "235", "236"]
    baseline_avg_episode_cost_usd: 58000
    baseline_avg_margin_per_case_usd: 4400

  MAJOR_BOWEL:
    label: Major Bowel Procedure
    drgs: ["329", "330", "331"]
    baseline_avg_episode_cost_usd: 34000
    baseline_avg_margin_per_case_usd: 2200

# Track parameters.
tracks:
  track_1:
    label: Track 1 — Upside only
    upside_cap_pct: 0.10
    downside_cap_pct: 0.00
    active_years: [2026]
  track_2:
    label: Track 2 — Shared risk (limited)
    upside_cap_pct: 0.10
    downside_cap_pct: 0.10
    active_years: [2026, 2027, 2028, 2029, 2030]
  track_3:
    label: Track 3 — Full risk
    upside_cap_pct: 0.20
    downside_cap_pct: 0.20
    active_years: [2027, 2028, 2029, 2030]

# CMS industry projection: two-thirds of participating hospitals
# expected to lose ~$1,350 per case at baseline year.
baseline_loss_projection:
  pct_hospitals_losing: 0.667
  avg_loss_per_case_usd: 1350

