name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check rcm_mc/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check config templates load
        run: |
          python -c "from rcm_mc.config import load_and_validate; load_and_validate('configs/actual.yaml')"
          python -c "from rcm_mc.config import load_and_validate; load_and_validate('configs/benchmark.yaml')"
          python -c "from rcm_mc.config import load_and_validate; load_and_validate('configs/templates/community_hospital_500m.yaml')"
