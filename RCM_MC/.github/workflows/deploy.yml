name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/rcm-mc

            echo "--- pull latest ---"
            git fetch origin main
            git reset --hard origin/main

            echo "--- rebuild & restart ---"
            cd RCM_MC
            docker compose -f ../deploy/docker-compose.yml pull --quiet 2>/dev/null || true
            docker compose -f ../deploy/docker-compose.yml up -d --build

            echo "--- health check ---"
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/health > /dev/null; then
                echo "healthy after ${i}x5s"
                exit 0
              fi
              sleep 5
            done
            echo "HEALTH CHECK FAILED" >&2
            exit 1

      - name: Smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            BASE="http://localhost:8080"

            # liveness + readiness
            curl -sf "$BASE/health" > /dev/null
            curl -sf "$BASE/ready" | grep -q '"ready"'

            # register a canary deal
            DEAL=$(curl -sf -X POST "$BASE/api/deals" \
              -H "Content-Type: application/json" \
              -d '{"deal_id":"deploy-smoke","name":"Deploy Smoke Hospital",
                   "profile":{"denial_rate":12,"days_in_ar":48,
                               "net_revenue":250000000,"bed_count":200,
                               "state":"TX"}}' | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('deal_id','deploy-smoke'))")
            echo "deal_id=$DEAL"

            # trigger analysis packet build
            curl -sf -X POST "$BASE/api/analysis/$DEAL" > /dev/null || true

            # workbench renders
            curl -sf "$BASE/analysis/$DEAL" | grep -q "SeekingChartis"

            # metrics endpoint returns data
            curl -sf "$BASE/api/metrics" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); \
               assert 'request_count' in d, 'missing request_count'"

            echo "All smoke tests passed."
