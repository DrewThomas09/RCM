version: "3.9"

services:
  rcm-mc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - /data/rcm:/data
    environment:
      - RCM_MC_DB=/data/rcm_mc.db
      - RCM_MC_AUTH=${RCM_MC_AUTH:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
