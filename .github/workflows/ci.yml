name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# All jobs run from the RCM_MC/ subdirectory because pyproject.toml,
# rcm_mc/, and tests/ all live there. The repo root holds README.md,
# FILE_INDEX.md, deployment docs, etc. but no Python code.
defaults:
  run:
    working-directory: ./RCM_MC

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run go-live test subset
        # Targeted subset (~175 tests, ~20s) covering smoke, auth, exports,
        # resilience, full pipeline, the README link checker, the NPPES
        # provider directory (14 tests; HTTP mocked), and the NPPES
        # provider-universe slice (connector + pipeline + CDD analytics;
        # all offline/mocked). Full suite is large; run via `pytest tests/`
        # locally before tagging a release.
        run: |
          pytest \
            tests/test_healthz.py \
            tests/test_api_endpoints_smoke.py \
            tests/test_full_pipeline_10_hospitals.py \
            tests/test_readme_links.py \
            tests/test_data_pipeline_resilience.py \
            tests/test_empty_data_resilience.py \
            tests/test_extreme_values_resilience.py \
            tests/test_exports_end_to_end.py \
            tests/test_auth.py \
            tests/test_csrf.py \
            tests/test_portfolio.py \
            tests/test_alerts.py \
            tests/test_health_score.py \
            tests/test_nppes_api_client.py \
            tests/test_nppes_universe_connector.py \
            tests/test_nppes_universe_pipeline.py \
            tests/test_nppes_universe_cdd.py

      - name: Smoke-test server boot + /health
        run: |
          python -c "
          import os, tempfile, threading, time, urllib.request
          from rcm_mc.server import build_server
          tmp = tempfile.mkdtemp()
          db = os.path.join(tmp, 'ci.db')
          server, handler = build_server(port=0, db_path=db, host='127.0.0.1')
          port = server.server_address[1]
          t = threading.Thread(target=server.serve_forever, daemon=True)
          t.start()
          time.sleep(0.5)
          resp = urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=5)
          assert resp.status == 200, f'health returned {resp.status}'
          assert resp.read().decode() == 'ok', 'health body mismatch'
          server.shutdown()
          print('SMOKE OK')
          "

  # The public-healthcare API connectors (connectors/ at the repo root) are
  # a self-contained, stdlib-only estate with no runtime dependencies, so
  # this job runs from the repo root with no pip install — independent of the
  # RCM_MC test job above.
  connectors:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run the connector estate test suite (openFDA + CMS + NPI + ICD-10 + unified)
        run: |
          python -m unittest \
            connectors.openfda.tests.test_transport \
            connectors.openfda.tests.test_connector \
            connectors.openfda.tests.test_normalize \
            connectors.openfda.tests.test_tables_query_lookup \
            connectors.openfda.tests.test_api_server \
            connectors.openfda.tests.test_company \
            connectors.openfda.tests.test_dq_pipeline \
            connectors.openfda.tests.test_market_map_rxnorm \
            connectors.cms_coverage.tests.test_transport \
            connectors.cms_coverage.tests.test_connector \
            connectors.cms_coverage.tests.test_normalize \
            connectors.cms_coverage.tests.test_tables \
            connectors.cms_coverage.tests.test_query \
            connectors.cms_coverage.tests.test_api_server \
            connectors.npi_registry.tests.test_transport \
            connectors.npi_registry.tests.test_connector \
            connectors.npi_registry.tests.test_normalize \
            connectors.npi_registry.tests.test_validate \
            connectors.npi_registry.tests.test_tables_query_lookup \
            connectors.npi_registry.tests.test_api_server \
            connectors.icd10.tests.test_transport \
            connectors.icd10.tests.test_connector \
            connectors.icd10.tests.test_normalize \
            connectors.icd10.tests.test_tables_query_lookup \
            connectors.icd10.tests.test_api_server \
            connectors.tests.test_registry \
            connectors.tests.test_spi \
            connectors.tests.test_api_server

      - name: Smoke-test the unified /v1 estate surface
        run: |
          python -m connectors.cli connectors
          python -c "
          import threading, time, json, urllib.request
          from connectors.api_server import open_stores, make_server
          stores = open_stores(':memory:')
          server, port = make_server(stores)
          t = threading.Thread(target=server.serve_forever, daemon=True)
          t.start()
          time.sleep(0.3)
          body = json.loads(urllib.request.urlopen(f'http://127.0.0.1:{port}/v1/datasets', timeout=5).read())
          assert len(body['datasets']) == 26, len(body['datasets'])
          server.shutdown()
          print('ESTATE SMOKE OK', len(body['datasets']), 'datasets')
          "
