name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Record start time for duration calc ──
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      # ── 2. SSH into VM, pull latest code, rebuild containers ──
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no -T "$SSH_USER@$SSH_HOST" << 'REMOTE_EOF'
          set -euo pipefail
          echo "==> Pulling latest code"
          cd /opt/rcm-mc
          sudo git fetch origin main
          sudo git reset --hard origin/main
          echo "==> Rebuilding containers (profile=tls)"
          cd RCM_MC/deploy
          sudo DOMAIN=pedesk.app docker compose --profile tls up -d --build
          echo "==> Deploy script finished on VM"
          REMOTE_EOF

      # ── 3. Verify the public URL returns 200 or 303 ──
      #    Retries up to 5 times with 5-second sleeps.
      - name: Health check (public URL)
        run: |
          set -euo pipefail
          URL="https://pedesk.app/"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' "$URL") || true
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "303" ]; then
              echo "Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Health check failed after 5 attempts"
          exit 1

      # ── 4. Job summary: commit info + deploy duration ──
      - name: Job summary
        if: always()
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          MINUTES=$(( DURATION / 60 ))
          SECONDS=$(( DURATION % 60 ))

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deploy Summary

          | Field | Value |
          |-------|-------|
          | **Commit** | \`${GITHUB_SHA::8}\` |
          | **Message** | $(git log -1 --format='%s' "$GITHUB_SHA" 2>/dev/null || echo "N/A — no checkout") |
          | **Branch** | \`$GITHUB_REF_NAME\` |
          | **Duration** | ${MINUTES}m ${SECONDS}s |
          | **Actor** | @$GITHUB_ACTOR |
          EOF

      # ── 5. (Optional) Slack / Discord notification ──
      #    Uncomment and fill in the webhook URL to enable.
