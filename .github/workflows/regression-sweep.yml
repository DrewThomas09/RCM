name: Weekly Regression Sweep

# Persistent weekly regression check for the six-session modules
# (QoR, QoE, compliance, integrations, engagement, platform wiring).
#
# Unlike the existing ci.yml (which runs on every push/PR), this
# workflow fires once a week and is specifically tuned to catch
# drift on the new modules. It:
#
#   1. Runs the full test suite
#   2. Extracts the total failure count
#   3. Verifies every six-session test file is still fully green
#   4. Compares total failures against a baseline snapshot
#   5. Writes a Markdown summary to $GITHUB_STEP_SUMMARY
#   6. Opens/updates a tracking issue when drift is detected
#
# Known baseline at the time of shipping: 133 pre-existing failures
# across the pre-existing UI-v2 test files. The six-session modules
# add 138 tests that should all pass.

on:
  schedule:
    # Every Monday at 08:17 UTC (off-the-hour to avoid the :00 rush)
    - cron: "17 8 * * 1"
  workflow_dispatch:        # Allow manual trigger from the Actions tab

permissions:
  contents: read
  issues: write             # For the auto-issue-on-drift behaviour

# All steps run from RCM_MC/ where pyproject.toml + tests/ live.
defaults:
  run:
    working-directory: ./RCM_MC

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run six-session modules (must all pass)
        id: six_session
        run: |
          set -o pipefail
          python -m pytest \
            tests/test_cash_waterfall.py \
            tests/test_qoe_memo.py \
            tests/test_phi_scanner.py \
            tests/test_audit_chain.py \
            tests/test_integration_sockets.py \
            tests/test_engagement.py \
            tests/test_engagement_pages.py \
            tests/test_compliance_cli.py \
            -q --tb=short 2>&1 | tee six_session.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run full suite
        id: full_sweep
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pytest --ignore=tests/test_integration_e2e.py \
            -q --tb=line 2>&1 | tee full_sweep.log || true

      - name: Extract totals
        id: extract
        if: always()
        run: |
          TOTAL_LINE=$(grep -E "^=+ [0-9]+ (failed|passed)" full_sweep.log | tail -1 || echo "NO_RESULT")
          FAIL_COUNT=$(echo "$TOTAL_LINE" | grep -oE "[0-9]+ failed" | head -1 | awk '{print $1}')
          PASS_COUNT=$(echo "$TOTAL_LINE" | grep -oE "[0-9]+ passed" | head -1 | awk '{print $1}')
          FAIL_COUNT=${FAIL_COUNT:-0}
          PASS_COUNT=${PASS_COUNT:-0}
          echo "failed=$FAIL_COUNT" >> "$GITHUB_OUTPUT"
          echo "passed=$PASS_COUNT" >> "$GITHUB_OUTPUT"
          echo "total_line=$TOTAL_LINE" >> "$GITHUB_OUTPUT"

          BASELINE_FAIL=133
          DELTA=$((FAIL_COUNT - BASELINE_FAIL))
          echo "delta=$DELTA" >> "$GITHUB_OUTPUT"
          echo "baseline=$BASELINE_FAIL" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Weekly Regression Sweep"
            echo ""
            echo "**Result**: ${{ steps.extract.outputs.total_line }}"
            echo ""
            echo "- Passed: ${{ steps.extract.outputs.passed }}"
            echo "- Failed: ${{ steps.extract.outputs.failed }}"
            echo "- Baseline (at ship time): ${{ steps.extract.outputs.baseline }}"
            echo "- Delta: ${{ steps.extract.outputs.delta }}"
            echo ""
            echo "### Six-session modules"
            if [ "${{ steps.six_session.outcome }}" = "success" ]; then
              echo ":white_check_mark: All six-session modules green."
            else
              echo ":x: **Regression in a six-session module.** See log below."
            fi
            echo ""
            echo "### Six-session log tail"
            echo '```'
            tail -40 six_session.log || echo "(no six-session log)"
            echo '```'
            echo ""
            echo "### Full-suite log tail"
            echo '```'
            tail -40 full_sweep.log || echo "(no full-suite log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Flag drift via tracking issue
        if: ${{ steps.six_session.outcome == 'failure' || steps.extract.outputs.delta > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const delta = parseInt('${{ steps.extract.outputs.delta }}', 10) || 0;
            const sixOk = '${{ steps.six_session.outcome }}' === 'success';
            const lines = [
              '## Regression sweep flagged drift',
              '',
              `- Passed: ${{ steps.extract.outputs.passed }}`,
              `- Failed: ${{ steps.extract.outputs.failed }}`,
              `- Baseline: ${{ steps.extract.outputs.baseline }}`,
              `- Delta vs baseline: ${delta}`,
              `- Six-session modules green: ${sixOk ? 'yes' : '**NO**'}`,
              '',
              `Full Actions run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '_Auto-created by `.github/workflows/regression-sweep.yml`._',
            ];
            const body = lines.join('\n');

            // Look for an existing open tracking issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'regression-sweep',
            });
            const title = `Regression sweep drift (delta=${delta}, six-session ${sixOk ? 'OK' : 'BROKEN'})`;
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['regression-sweep'],
              });
            }

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-logs
          path: |
            six_session.log
            full_sweep.log
          retention-days: 30
