# TEMPORARY research workflow (will be removed): fetches the official CMS
# CY2026 PFS relative value file (RVU26B/RVU26A) on a GitHub-hosted runner
# (which has unrestricted internet) and prints the PPRRVU26 rows for selected
# drug administration CPT codes to the job log. No artifacts are committed.
name: CMS RVU26 Fetch

on:
  push:
    branches: ["claude/optimistic-wozniak-j32lxj"]
    paths: [".github/workflows/cms-rvu-fetch.yml"]
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download and grep CMS RVU26 file
        run: |
          set -uo pipefail
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          mkdir -p work && cd work
          for page in rvu26b rvu26a; do
            echo "::group::PAGE $page"
            curl -sL -A "$UA" "https://www.cms.gov/medicare/payment/fee-schedules/physician/pfs-relative-value-files/${page}" -o page.html || true
            grep -oE 'href="[^"]*\.zip[^"]*"' page.html | sed 's/href="//;s/"$//' | sort -u | tee links.txt
            URL=$(head -1 links.txt || true)
            echo "::endgroup::"
            if [ -n "${URL:-}" ]; then
              case "$URL" in
                http*) : ;;
                /*) URL="https://www.cms.gov${URL}" ;;
              esac
              echo "MARKER_ZIPURL ${page} ${URL}"
              curl -sL -A "$UA" "$URL" -o "${page}.zip" || true
              ls -la "${page}.zip"
              mkdir -p "${page}" && cd "${page}" && unzip -o "../${page}.zip" >/dev/null 2>&1; ls -la; cd ..
            fi
          done
          echo "MARKER_FILES"
          find . -iname "PPRRVU*" -o -iname "*RVU26*" | sort
          for f in $(find . -iname "PPRRVU*.csv" | sort); do
            echo "MARKER_HEADER $f"
            head -12 "$f" | cut -c1-500
            echo "MARKER_ROWS $f"
            grep -E "^(96360|96361|96365|96366|96367|96368|96372|96374|96375|96413|96415|96416|96417)," "$f" || true
          done
          for f in $(find . -iname "PPRRVU*.txt" | sort); do
            echo "MARKER_TXTROWS $f"
            grep -E "^(96360|96361|96365|96366|96367|96368|96372|96374|96375|96413|96415|96416|96417)" "$f" | cut -c1-300 || true
          done
          echo "MARKER_DONE"
