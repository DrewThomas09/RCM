name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Build runs from RCM_MC/ where pyproject.toml lives.
defaults:
  run:
    working-directory: ./RCM_MC

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: RCM_MC/dist/*
          generate_release_notes: true
